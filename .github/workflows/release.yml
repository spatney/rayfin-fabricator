name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
            artifacts: |
              src-tauri/target/release/bundle/nsis/*-setup.exe
              src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          # macOS ships an Apple-silicon (arm64) build. The updater artifact is
          # the *.app.tar.gz; the *.dmg is for manual download.
          - os: macos-latest
            bundles: app,dmg
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        # github-copilot-sdk requires Rust >= 1.94 (edition 2024); stable satisfies it.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache bundled Copilot CLI archive
        uses: actions/cache@v4
        with:
          # The Copilot SDK's build.rs downloads the platform CLI archive and
          # embeds it into the binary. Persist that download across runs so we
          # don't re-fetch it every build. Keyed on Cargo.lock, which pins the
          # SDK version (and therefore the bundled CLI version).
          path: ${{ runner.temp }}/copilot-cli-cache
          key: copilot-cli-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            copilot-cli-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Write telemetry configuration
        run: node -e "const fs=require('fs');fs.mkdirSync('resources',{recursive:true});fs.writeFileSync('resources/telemetry.json',JSON.stringify({connectionString:process.env.CS},null,2))"
        env:
          CS: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}

      # --- Windows code signing (Azure Trusted / Artifact Signing) -------------
      - name: Detect code-signing configuration (Windows)
        if: runner.os == 'Windows'
        id: signing
        shell: bash
        env:
          SIGNING_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
        run: |
          if [ -n "$SIGNING_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code signing: ENABLED (Azure Trusted / Artifact Signing)"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code signing: disabled (no AZURE_SIGNING_CLIENT_ID secret) — building unsigned"
          fi

      - name: Install Azure Artifact Signing CLI
        if: runner.os == 'Windows' && steps.signing.outputs.enabled == 'true'
        run: cargo install artifact-signing-cli --version 0.11.0

      - name: Generate signing configuration (Windows)
        if: runner.os == 'Windows' && steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          SIGNING_PROFILE: ${{ vars.AZURE_SIGNING_CERT_PROFILE }}
        run: |
          if [ -z "$SIGNING_ENDPOINT" ] || [ -z "$SIGNING_ACCOUNT" ] || [ -z "$SIGNING_PROFILE" ]; then
            echo "::error::Signing credentials are set but one or more signing variables (AZURE_SIGNING_ENDPOINT, AZURE_SIGNING_ACCOUNT, AZURE_SIGNING_CERT_PROFILE) are missing."
            exit 1
          fi
          printf '{ "bundle": { "windows": { "signCommand": "artifact-signing-cli -e %s -a %s -c %s %%1" } } }\n' \
            "$SIGNING_ENDPOINT" "$SIGNING_ACCOUNT" "$SIGNING_PROFILE" > src-tauri/tauri.signing.conf.json
          echo "Generated src-tauri/tauri.signing.conf.json:"
          cat src-tauri/tauri.signing.conf.json

      # --- macOS code signing (Apple Developer ID + notarization) --------------
      - name: Detect code-signing configuration (macOS)
        if: runner.os == 'macOS'
        id: macsigning
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code signing: ENABLED (Apple Developer ID + notarization)"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code signing: disabled (no APPLE_SIGNING_IDENTITY secret) — building ad-hoc/unsigned"
          fi

      # --- Build ---------------------------------------------------------------
      - name: Build Tauri installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SIGNING_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_SIGNING_TENANT_ID }}
          # Reuse the cached Copilot CLI archive that build.rs embeds (see the
          # "Cache bundled Copilot CLI archive" step). Avoids re-downloading on
          # every build; build.rs creates the directory on a cache miss.
          BUNDLED_CLI_CACHE_DIR: ${{ runner.temp }}/copilot-cli-cache
          # Updater signing — emits *-setup.exe.sig used by latest.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${{ steps.signing.outputs.enabled }}" = "true" ]; then
            echo "Building signed installer…"
            npm run tauri:build -- --bundles ${{ matrix.bundles }} --config src-tauri/tauri.signing.conf.json
          else
            echo "Building unsigned installer…"
            npm run tauri:build -- --bundles ${{ matrix.bundles }}
          fi

      - name: Build Tauri bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          BUNDLED_CLI_CACHE_DIR: ${{ runner.temp }}/copilot-cli-cache
          # Updater signing — emits *.app.tar.gz.sig used by latest.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization. When these secrets are absent the
          # build is ad-hoc/unsigned; adding them later auto-enables signing with
          # no workflow change. Tauri imports APPLE_CERTIFICATE (base64 .p12) into
          # a temporary keychain and notarizes via APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ steps.macsigning.outputs.enabled }}" = "true" ]; then
            echo "Building signed + notarized app…"
          else
            echo "Building ad-hoc/unsigned app…"
            # The APPLE_* env vars above are set to empty strings when their
            # secrets are absent. Tauri treats a *present* (even empty)
            # APPLE_CERTIFICATE as "sign me" and fails on `security import`, so
            # remove them entirely for an unsigned build.
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi
          npm run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -R dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: false
          files: |
            dist/**/*-setup.exe
            dist/**/*-setup.exe.sig
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and upload updater manifest (latest.json)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          notes=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body' || true)
          if [ -z "$notes" ] || [ "$notes" = "null" ]; then
            notes="See https://github.com/${REPO}/releases/tag/${TAG}"
          fi

          # Resolve a published asset's browser-download URL by suffix. GitHub
          # turns spaces in asset names into dots, so we match on the suffix
          # rather than guessing the exact name.
          asset_url() {
            gh release view "$TAG" --repo "$REPO" --json assets \
              --jq ".assets[] | select(.name | endswith(\"$1\")) | .url" | head -n1
          }

          platforms='{}'

          # Windows (x86_64) — updater artifact is the NSIS *-setup.exe.
          exe=$(find dist -name '*-setup.exe' 2>/dev/null | head -n1 || true)
          if [ -n "$exe" ] && [ -f "${exe}.sig" ]; then
            url=$(asset_url "-setup.exe")
            if [ -z "$url" ]; then
              echo "::error::Could not resolve the Windows installer asset URL on release $TAG"
              exit 1
            fi
            platforms=$(printf '%s' "$platforms" | jq \
              --arg s "$(cat "${exe}.sig")" --arg u "$url" \
              '. + {"windows-x86_64": {signature: $s, url: $u}}')
            echo "Added windows-x86_64 -> $url"
          fi

          # macOS (arm64) — updater artifact is the *.app.tar.gz.
          tgz=$(find dist -name '*.app.tar.gz' 2>/dev/null | head -n1 || true)
          if [ -n "$tgz" ] && [ -f "${tgz}.sig" ]; then
            url=$(asset_url ".app.tar.gz")
            if [ -z "$url" ]; then
              echo "::error::Could not resolve the macOS app.tar.gz asset URL on release $TAG"
              exit 1
            fi
            platforms=$(printf '%s' "$platforms" | jq \
              --arg s "$(cat "${tgz}.sig")" --arg u "$url" \
              '. + {"darwin-aarch64": {signature: $s, url: $u}}')
            echo "Added darwin-aarch64 -> $url"
          fi

          if [ "$platforms" = "{}" ]; then
            echo "::error::No updater artifacts (.sig) found for any platform — was the build signed with TAURI_SIGNING_PRIVATE_KEY?"
            exit 1
          fi

          jq -n \
            --arg version "$version" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json
          echo "Generated latest.json:"
          cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
