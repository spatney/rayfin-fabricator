name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is parked until the Tauri port is validated on mac; add
        # `macos-latest` back here (and an Apple-target Rust toolchain) to ship it.
        os: [windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        # github-copilot-sdk requires Rust >= 1.94 (edition 2024); stable satisfies it.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache bundled Copilot CLI archive
        uses: actions/cache@v4
        with:
          # The Copilot SDK's build.rs downloads the platform CLI archive and
          # embeds it into the binary. Persist that download across runs so we
          # don't re-fetch it every build. Keyed on Cargo.lock, which pins the
          # SDK version (and therefore the bundled CLI version).
          path: ${{ runner.temp }}/copilot-cli-cache
          key: copilot-cli-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            copilot-cli-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Write telemetry configuration
        run: node -e "const fs=require('fs');fs.mkdirSync('resources',{recursive:true});fs.writeFileSync('resources/telemetry.json',JSON.stringify({connectionString:process.env.CS},null,2))"
        env:
          CS: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}

      - name: Detect code-signing configuration
        id: signing
        shell: bash
        env:
          SIGNING_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
        run: |
          if [ -n "$SIGNING_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code signing: ENABLED (Azure Trusted / Artifact Signing)"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code signing: disabled (no AZURE_SIGNING_CLIENT_ID secret) — building unsigned"
          fi

      - name: Install Azure Artifact Signing CLI
        if: steps.signing.outputs.enabled == 'true'
        run: cargo install artifact-signing-cli --version 0.11.0

      - name: Generate signing configuration
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          SIGNING_PROFILE: ${{ vars.AZURE_SIGNING_CERT_PROFILE }}
        run: |
          if [ -z "$SIGNING_ENDPOINT" ] || [ -z "$SIGNING_ACCOUNT" ] || [ -z "$SIGNING_PROFILE" ]; then
            echo "::error::Signing credentials are set but one or more signing variables (AZURE_SIGNING_ENDPOINT, AZURE_SIGNING_ACCOUNT, AZURE_SIGNING_CERT_PROFILE) are missing."
            exit 1
          fi
          printf '{ "bundle": { "windows": { "signCommand": "artifact-signing-cli -e %s -a %s -c %s %%1" } } }\n' \
            "$SIGNING_ENDPOINT" "$SIGNING_ACCOUNT" "$SIGNING_PROFILE" > src-tauri/tauri.signing.conf.json
          echo "Generated src-tauri/tauri.signing.conf.json:"
          cat src-tauri/tauri.signing.conf.json

      - name: Build Tauri installer
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SIGNING_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_SIGNING_TENANT_ID }}
          # Reuse the cached Copilot CLI archive that build.rs embeds (see the
          # "Cache bundled Copilot CLI archive" step). Avoids re-downloading on
          # every build; build.rs creates the directory on a cache miss.
          BUNDLED_CLI_CACHE_DIR: ${{ runner.temp }}/copilot-cli-cache
          # Updater signing — emits *-setup.exe.sig used by latest.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${{ steps.signing.outputs.enabled }}" = "true" ]; then
            echo "Building signed installer…"
            npm run tauri:build -- --config src-tauri/tauri.signing.conf.json
          else
            echo "Building unsigned installer…"
            npm run tauri:build
          fi

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -R dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: false
          files: |
            dist/*-setup.exe
            dist/*-setup.exe.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and upload updater manifest (latest.json)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          exe=$(ls dist/*-setup.exe | head -n1)
          sig_file="${exe}.sig"
          if [ ! -f "$sig_file" ]; then
            echo "::error::Updater signature $sig_file not found — was the build signed with TAURI_SIGNING_PRIVATE_KEY?"
            exit 1
          fi
          signature=$(cat "$sig_file")
          # GitHub turns spaces in asset names into dots; resolve the real browser
          # download URL from the published release rather than guessing the name.
          url=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '.assets[] | select(.name | endswith("-setup.exe")) | .url' | head -n1)
          if [ -z "$url" ]; then
            echo "::error::Could not resolve the installer asset URL on release $TAG"
            exit 1
          fi
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          notes=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body' || true)
          if [ -z "$notes" ] || [ "$notes" = "null" ]; then
            notes="See https://github.com/${REPO}/releases/tag/${TAG}"
          fi
          jq -n \
            --arg version "$version" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --arg signature "$signature" \
            --arg url "$url" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: {"windows-x86_64": {signature: $signature, url: $url}}}' \
            > latest.json
          echo "Generated latest.json:"
          cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
