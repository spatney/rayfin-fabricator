<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'"
    />
    <title>Fabricator</title>
    <link rel="icon" type="image/png" href="./src/assets/logo.png" />
    <style>
      /* Paint the app background on the very first frame so there is no flash before
         the bundled stylesheet (main.css) and theme are applied. The default theme is
         'system', so match the OS here via prefers-color-scheme — CSP forbids inline
         scripts, so this stays pure CSS. Backgrounds mirror --bg in main.css. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0e14;
      }
      :root {
        color-scheme: dark;
      }
      @media (prefers-color-scheme: light) {
        html,
        body {
          background: #eceff4;
        }
        :root {
          color-scheme: light;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
