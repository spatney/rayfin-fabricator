appId: com.rayfin.fabricator
productName: Rayfin Fabricator
copyright: Copyright © Rayfin Fabricator

# electron-builder reads platform icons from this directory. We ship a single
# 512x512 build/icon.png and let electron-builder generate the .ico / .icns.
directories:
  buildResources: build
  output: dist

# The renderer/main/preload bundles live in out/; the runtime app icon is read
# from resources/icon.png via app.getAppPath(), so resources/ must ship inside the
# app root. Keep source, configs and editor metadata out of the packaged app.
files:
  - out/**
  - resources/**
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!electron-builder.{yml,yaml}'
  - '!{.eslintrc.cjs,eslint.config.mjs,.prettierignore,.prettierrc.yaml}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.boot.log.out,.boot.log.err}'

asar: true
# Keep the icon as a real file on disk so nativeImage / the OS taskbar can read a
# concrete path (app.getAppPath()/resources/icon.png resolves via the asar shim).
asarUnpack:
  - resources/**

win:
  executableName: rayfin-fabricator
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

mac:
  category: public.app-category.developer-tools
  artifactName: ${name}-${version}.${ext}
  target:
    - dmg
    - zip
  notarize: false

linux:
  category: Development
  target:
    - AppImage
    - deb

# Installers are distributed via GitHub Releases. The CI release job uploads
# dist/ installers to the GitHub Release created for each v* tag.
#
# Windows note: building the NSIS installer (or embedding the exe icon via rcedit)
# downloads electron-builder's winCodeSign tool, whose archive contains macOS
# symlinks. Extracting them needs symlink privilege — enable Windows "Developer
# Mode" or run the build from an elevated shell. To validate packaging without
# that privilege, run an unsigned app-dir build:
#   npx electron-builder --dir -c.win.signAndEditExecutable=false
publish: null
npmRebuild: false
